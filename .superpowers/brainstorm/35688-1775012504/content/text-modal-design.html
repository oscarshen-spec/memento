<h2>Text Tool — Full Design</h2>
<p class="subtitle">Toolbar button + modal mockup. Does this look right?</p>

<div class="section">
  <div class="label">Toolbar (top-left of desk)</div>
  <div style="background:#1a0f05;border-radius:12px;padding:16px 20px;display:inline-flex;gap:16px;align-items:center;margin-top:8px;">
    <!-- Tape tool (existing) -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.08);">
      <svg width="24" height="24" viewBox="0 0 26 26" fill="none">
        <circle cx="13" cy="13" r="11" stroke="rgba(255,255,255,0.7)" stroke-width="2.2" fill="rgba(255,255,255,0.08)"/>
        <circle cx="13" cy="13" r="4.5" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" fill="rgba(30,20,10,0.7)"/>
      </svg>
      <div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);"></div>
    </div>
    <!-- Text tool (new) -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border-radius:8px;color:rgba(255,255,255,0.45);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 7 4 4 20 4 20 7"/>
        <line x1="9" y1="20" x2="15" y2="20"/>
        <line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
    </div>
    <div style="color:rgba(255,255,255,0.2);font-size:10px;font-family:monospace;">← text tool</div>
  </div>
</div>

<div class="section">
  <div class="label">Text Modal (slides up from bottom)</div>
  <div style="background:white;border-radius:24px 24px 0 0;max-width:480px;overflow:hidden;box-shadow:0 -8px 40px rgba(0,0,0,0.15);margin-top:8px;">
    <!-- Header -->
    <div style="padding:20px 24px 16px;border-bottom:1px solid #f0ece4;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-family:'Georgia',serif;font-style:italic;font-size:20px;">Add Text</span>
      <div style="width:36px;height:36px;background:#f5f5f5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#888;">✕</div>
    </div>

    <div style="padding:20px 24px;display:flex;flex-direction:column;gap:20px;">

      <!-- Font style -->
      <div>
        <div style="font-size:9px;font-family:monospace;text-transform:uppercase;letter-spacing:2px;color:#aaa;margin-bottom:10px;">Font Style</div>
        <div style="display:flex;gap:8px;">
          <div style="flex:1;border:2px solid #1a1a1a;border-radius:14px;padding:12px;text-align:center;background:#fafafa;">
            <div style="font-family:'Georgia',serif;font-style:italic;font-weight:bold;font-size:20px;">Aa</div>
            <div style="font-size:8px;font-family:monospace;text-transform:uppercase;letter-spacing:1px;margin-top:5px;color:#555;">Serif</div>
          </div>
          <div style="flex:1;border:2px solid #e0e0e0;border-radius:14px;padding:12px;text-align:center;">
            <div style="font-family:'Courier New',monospace;font-size:18px;">Aa</div>
            <div style="font-size:8px;font-family:monospace;text-transform:uppercase;letter-spacing:1px;margin-top:5px;color:#aaa;">Mono</div>
          </div>
          <div style="flex:1;border:2px solid #e0e0e0;border-radius:14px;padding:12px;text-align:center;">
            <div style="font-family:'Comic Sans MS',cursive;font-size:19px;">Aa</div>
            <div style="font-size:8px;font-family:monospace;text-transform:uppercase;letter-spacing:1px;margin-top:5px;color:#aaa;">Hand</div>
          </div>
        </div>
      </div>

      <!-- Size -->
      <div>
        <div style="font-size:9px;font-family:monospace;text-transform:uppercase;letter-spacing:2px;color:#aaa;margin-bottom:10px;">Size</div>
        <div style="display:flex;gap:8px;">
          <div style="flex:1;border:2px solid #e0e0e0;border-radius:10px;padding:10px;text-align:center;">
            <div style="font-family:'Georgia',serif;font-style:italic;font-size:13px;">Aa</div>
            <div style="font-size:8px;font-family:monospace;text-transform:uppercase;letter-spacing:1px;margin-top:4px;color:#aaa;">Small</div>
          </div>
          <div style="flex:1;border:2px solid #1a1a1a;border-radius:10px;padding:10px;text-align:center;background:#fafafa;">
            <div style="font-family:'Georgia',serif;font-style:italic;font-size:19px;">Aa</div>
            <div style="font-size:8px;font-family:monospace;text-transform:uppercase;letter-spacing:1px;margin-top:4px;color:#555;">Medium</div>
          </div>
          <div style="flex:1;border:2px solid #e0e0e0;border-radius:10px;padding:10px;text-align:center;">
            <div style="font-family:'Georgia',serif;font-style:italic;font-size:26px;line-height:1;">Aa</div>
            <div style="font-size:8px;font-family:monospace;text-transform:uppercase;letter-spacing:1px;margin-top:4px;color:#aaa;">Large</div>
          </div>
        </div>
      </div>

      <!-- Color -->
      <div>
        <div style="font-size:9px;font-family:monospace;text-transform:uppercase;letter-spacing:2px;color:#aaa;margin-bottom:10px;">Color</div>
        <div style="display:flex;gap:10px;align-items:center;">
          <div style="width:34px;height:34px;border-radius:50%;background:#1a1a1a;border:3px solid #1a1a1a;box-shadow:0 0 0 2px white,0 0 0 4px #1a1a1a;"></div>
          <div style="width:34px;height:34px;border-radius:50%;background:#7b2d2d;border:3px solid transparent;"></div>
          <div style="width:34px;height:34px;border-radius:50%;background:#1a3a6a;border:3px solid transparent;"></div>
          <div style="width:34px;height:34px;border-radius:50%;background:#2d5a3d;border:3px solid transparent;"></div>
          <div style="width:34px;height:34px;border-radius:50%;background:#6b4c2a;border:3px solid transparent;"></div>
          <div style="width:34px;height:34px;border-radius:50%;background:#f0ece4;border:3px solid #ddd;"></div>
        </div>
      </div>

      <!-- Textarea -->
      <textarea placeholder="Write something..." style="width:100%;height:80px;background:#f8f5ef;border:none;border-radius:14px;padding:14px;font-family:'Georgia',serif;font-style:italic;font-size:17px;resize:none;box-shadow:inset 0 1px 4px rgba(0,0,0,0.06);color:#1a1a1a;box-sizing:border-box;" readonly></textarea>

      <!-- Submit -->
      <div style="background:#1a1a1a;color:white;border-radius:14px;padding:16px;text-align:center;font-family:monospace;font-size:11px;font-weight:bold;letter-spacing:3px;text-transform:uppercase;">✓ ADD TO PAGE</div>

    </div>
  </div>
</div>
